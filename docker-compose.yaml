services:
  object_detection:
    image: object_detection:0.3.0
    container_name: object_detection
    build: .
    volumes:
      - ./:/app
    environment:
      - XDG_RUNTIME_DIR=/run/user/1/ # Prevent raise error message XDG_RUNTIME_DIR is invalid
    network_mode: "host"
    tty: True
    mem_limit: 2g
    cpus: 4
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]